<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #0f172a; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; }
    .card { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid rgba(155,114,243,0.3); text-align: center; max-width: 400px; }
    h1 { color: #818cf8; margin-top: 0; }
    p { color: #94a3b8; }
    button { background: #4f46e5; color: white; border: none; padding: 12px 30px; border-radius: 30px; font-weight: 600; cursor: pointer; transition: 0.2s; margin-top: 20px; }
    button:hover { transform: scale(1.05); background: #6366f1; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Configuración de Voz</h1>
    <p>Para hablar con Gemini a través de esta extensión, necesitamos acceso al micrófono.</p>
    <p><strong>Haz clic abajo y selecciona "Permitir" en la parte superior derecha.</strong></p>
    <button id="grant-btn">Activar Micrófono</button>
  </div>
  <script src="grant.js"></script>
</body>
</html>
