name: Deploy Voice Agent Stack

on:
  push:
    branches:
      - main
    paths:
      - 'aws/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Set up AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: SAM Build
        working-directory: aws
        run: sam build

      - name: SAM Deploy
        working-directory: aws
        run: |
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset \
            --stack-name voice-agent-hub \
            --s3-bucket ${{ secrets.AWS_SAM_S3_BUCKET }} \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --parameter-overrides \
              ElevenLabsApiKey=${{ secrets.ELEVENLABS_API_KEY }} \
              ElevenLabsAgentId=${{ secrets.ELEVENLABS_AGENT_ID }} \
              ElevenLabsPhoneNumberId=${{ secrets.ELEVENLABS_PHONE_NUMBER_ID }} \
              UserPhoneNumber=${{ secrets.USER_PHONE_NUMBER }} \
              ApiBearerToken=${{ secrets.API_BEARER_TOKEN }}
