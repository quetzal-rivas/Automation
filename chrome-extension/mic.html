<!DOCTYPE html>
<html>
<head>
  <style>
    body { background: #020617; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; overflow: hidden; margin: 0; }
    .status { font-size: 14px; color: #818cf8; margin-bottom: 20px; letter-spacing: 2px; text-transform: uppercase; }
    #canvas { width: 100%; height: 200px; }
    .mic-icon { width: 80px; height: 80px; background: rgba(147, 51, 234, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; border: 2px solid #a855f7; box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); animation: breathe 3s infinite; }
    @keyframes breathe { 0%, 100% { transform: scale(1); box-shadow: 0 0 30px rgba(168, 85, 247, 0.4); } 50% { transform: scale(1.1); box-shadow: 0 0 50px rgba(168, 85, 247, 0.6); } }
    .label { font-size: 24px; font-weight: bold; background: linear-gradient(to right, #a78bfa, #f472b6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  </style>
</head>
<body>
  <div class="status" id="state-text">MOTOR DE VOZ ANTIGRAVITY</div>
  <div class="mic-icon">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
  </div>
  <div class="label">Gemini Live activo</div>
  <canvas id="canvas"></canvas>
  <script src="mic.js"></script>
</body>
</html>
