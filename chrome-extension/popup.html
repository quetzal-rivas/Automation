<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 280px;
      padding: 20px;
      background: #0f172a;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      margin: 0;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .logo {
      width: 60px;
      height: 60px;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #4285F4, #9b72f3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(155,114,243,0.4);
    }

    h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
      letter-spacing: -0.5px;
    }

    p {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 25px;
    }

    #call-btn {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(34,197,94,0.3);
      width: 100%;
      justify-content: center;
    }

    #call-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(34,197,94,0.4);
    }

    #call-btn:active {
      transform: scale(0.98);
    }

    /* Loader */
    .loader {
      display: none;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top: 3px solid #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    #status-msg {
      display: none;
      font-size: 12px;
      margin-top: 15px;
      color: #ec4899;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
        <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
        <line x1="12" y1="19" x2="12" y2="23"></line>
        <line x1="8" y1="23" x2="16" y2="23"></line>
      </svg>
    </div>
    <h2>Antigravity Voice</h2>
    <p>¿Listo para codificar por voz hoy?</p>
    
    <button id="call-btn">
      <span id="btn-text">Iniciar Llamada</span>
      <div class="loader" id="loader"></div>
    </button>
    <div id="status-msg">Conectando llamada, espera un segundo...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
