<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 280px; padding: 20px; background: #0f172a; color: white; font-family: -apple-system, sans-serif; overflow: hidden; margin: 0; }
    .container { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .logo { width: 50px; height: 50px; margin-bottom: 12px; background: linear-gradient(135deg, #4285F4, #9b72f3); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(155,114,243,0.4); }
    h2 { margin: 0 0 5px 0; font-size: 16px; letter-spacing: -0.5px; }
    p { font-size: 12px; color: #94a3b8; margin-bottom: 20px; }
    
    #call-btn {
      width: 100%; padding: 12px; border-radius: 30px; border: none; font-weight: 600; font-size: 14px; cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; align-items: center; justify-content: center; gap: 10px;
    }

    .state-disconnected { background: linear-gradient(135deg, #22c55e, #16a34a); box-shadow: 0 4px 15px rgba(34,197,94,0.3); }
    .state-connecting { background: #334155; pointer-events: none; }
    .state-connected { background: linear-gradient(135deg, #ef4444, #dc2626); box-shadow: 0 4px 15px rgba(239,68,68,0.3); }

    .loader { display: none; width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    #status-badge { font-size: 10px; padding: 3px 8px; border-radius: 10px; margin-top: 15px; background: rgba(255,255,255,0.05); color: #94a3b8; display: none; }
    .pulse-pink { color: #f472b6 !important; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
    </div>
    <h2>Antigravity Bridge</h2>
    <p id="sub-text">Conexión con Gemini Multimodal Live establecida.</p>
    
    <button id="call-btn" class="state-disconnected">
      <span id="btn-text">Iniciar Llamada</span>
      <div class="loader" id="loader"></div>
    </button>
    <div id="status-badge">Estado: Desconectado</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
